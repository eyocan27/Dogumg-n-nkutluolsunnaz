<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Naz!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #0c0c0c;
        }

        /* Arka Plan Fotoğraf Slayt Alanı */
        .bg-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0;
            transition: opacity 0.4s ease-in-out; /* Hızlı geçişe uygun olması için kararma süresini de kısalttım */
        }

        /* Fotoğrafların arkasında blurlu arka plan efekti */
        .slide::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: inherit;
            background-size: cover;
            background-position: center;
            filter: blur(20px);
            z-index: -1;
            opacity: 0.3;
        }

        .slide.active {
            opacity: 0.6;
        }

        /* Ön Plandaki Karartma Katmanı */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.7));
            z-index: 2;
        }

        /* İçerik Alanı */
        .content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            text-align: center;
            color: white;
            padding: 20px;
        }

        h1 {
            font-size: 3.2rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
            animation: fadeInDown 1.5s ease;
        }

        p {
            font-size: 1.4rem;
            margin-bottom: 30px;
            max-width: 600px;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.9);
            animation: fadeInUp 1.5s ease;
        }

        /* Buton */
        .btn {
            padding: 14px 30px;
            font-size: 1.1rem;
            background-color: #3498db; 
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
            animation: pulse 2s infinite;
        }

        .btn:hover {
            background-color: #2980b9;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.5);
        }

        /* Gizli Mesaj Alanı */
        .secret-note {
            display: none;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 500px;
            animation: zoomIn 0.5s ease;
        }

        /* Animasyonlar */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* Mobil Uyum */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            p { font-size: 1.1rem; }
            .btn { padding: 12px 25px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-slider">
        <div class="slide active" style="background-image: url('https://i.hizliresim.com/8d6pm46.jpeg');"></div>
        <div class="slide" style="background-image: url('https://i.hizliresim.com/skzuzrm.jpeg');"></div>
        <div class="slide" style="background-image: url('https://i.hizliresim.com/rlxm229.jpeg');"></div>
        <div class="slide" style="background-image: url('https://i.hizliresim.com/i6puhs7.jpeg');"></div>
        <div class="slide" style="background-image: url('https://i.hizliresim.com/9n41n77.jpeg');"></div>
    </div>

    <div class="overlay"></div>

    <div class="content">
        <h1>Doğum Günün Kutlu Olsun Naz! 🎉</h1>
        <p>Yeni yaşın sana tüm güzellikleri getirsin.</p>
        
        <button class="btn" id="surprizBtn" onclick="surpriziAc()">Tıkla ✨</button>

        <div class="secret-note" id="note">
            <h3>Nice Mutlu Yıllara!</h3>
            <p style="font-size: 1.1rem; margin-top: 10px; color: #e0e0e0;">Sağlıklı, başarılı ve her şeyin gönlünce olduğu harika bir yaş dilerim.</p>
            <p style="font-size: 0.9rem; margin-top: 15px; color: #f1c40f; animation: pulse 1.5s infinite;">Sürprize yönlendiriliyorsun, bekle...</p>
        </div>
    </div>

    <audio id="dogumGunuMuzigi" src="muzik.mp3" loop></audio>

    <script>
        // Slayt sistemi (1 saniyede bir değişecek şekilde 1000 milisaniyeye ayarlandı)
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        if(slides.length > 1) {
            setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 1400); // 1 saniye
        }

        // Buton fonksiyonu ve Youtube yönlendirmesi
        function surpriziAc() {
            const muzik = document.getElementById('dogumGunuMuzigi');
            const note = document.getElementById('note');
            const btn = document.getElementById('surprizBtn');

            muzik.play().catch(error => {
                console.log("Müzik çalınamadı:", error);
            });

            note.style.display = 'block';
            btn.style.display = 'none';

            // 5 saniye sonra Youtube'a yönlendir
            setTimeout(() => {
                window.location.href = "https://youtu.be/sSDxIJ3ZEr4?si=wqpPMx8tZ96lNLAi";
            }, 5000);
        }
    </script>
</body>
</html>
